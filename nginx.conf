server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Statik dosyalar uzun cache (immutable hash'li, vite zaten hash ekliyor).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: bilinmeyen path'lerde index.html'e fallback (React Router halletsin).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Güvenlik header'ları (production minimum).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;
}
